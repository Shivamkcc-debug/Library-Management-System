{% extends 'base.html' %}
{% block title %}Add Member{% endblock %}
{% block page_title %}Register New Member{% endblock %}

{% block content %}
<div class="form-card">
  <h2>👤 Register New Member</h2>
  <form method="POST" action="{{ url_for('add_member') }}">
    <div class="form-row">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" placeholder="e.g. Rahul Sharma" required autofocus>
      </div>
      <div class="form-group">
        <label>Roll Number *</label>
        <input type="text" name="roll_number" placeholder="e.g. CS2024001" required>
      </div>
    </div>
    <div class="form-group">
      <label>Department *</label>
      <select name="department" required>
        <option value="">Select department…</option>
        {% for dept in departments %}
          <option value="{{ dept }}">{{ dept }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="student@college.edu">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phone" placeholder="10-digit number">
      </div>
    </div>
    <div class="form-group">
      <label>Address</label>
      <input type="text" name="address" placeholder="Hostel / Home address">
    </div>
    <div style="display:flex; gap:12px; margin-top:8px;">
      <button type="submit" class="btn btn-primary" style="flex:1;">✅ Register Member</button>
      <a href="{{ url_for('view_members') }}" class="btn btn-secondary" style="flex:1; justify-content:center;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
