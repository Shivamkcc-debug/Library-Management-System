{% extends 'base.html' %}
{% block title %}Edit Member{% endblock %}
{% block page_title %}Edit Member{% endblock %}

{% block content %}
<div class="form-card">
  <h2>✏️ Edit Member — {{ member.roll_number }}</h2>
  <form method="POST" action="{{ url_for('edit_member', member_id=member.id) }}">
    <div class="form-row">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" value="{{ member.name }}" required>
      </div>
      <div class="form-group">
        <label>Roll Number *</label>
        <input type="text" name="roll_number" value="{{ member.roll_number }}" required>
      </div>
    </div>
    <div class="form-group">
      <label>Department *</label>
      <select name="department" required>
        {% for dept in departments %}
          <option value="{{ dept }}" {% if dept == member.department %}selected{% endif %}>{{ dept }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ member.email or '' }}">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phone" value="{{ member.phone or '' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Address</label>
      <input type="text" name="address" value="{{ member.address or '' }}">
    </div>
    <div style="display:flex; gap:12px; margin-top:8px;">
      <button type="submit" class="btn btn-primary" style="flex:1;">💾 Save Changes</button>
      <a href="{{ url_for('view_members') }}" class="btn btn-secondary" style="flex:1; justify-content:center;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
