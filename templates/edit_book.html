{% extends 'base.html' %}
{% block title %}Edit Book{% endblock %}
{% block page_title %}Edit Book{% endblock %}

{% block content %}
<div class="form-card">
  <h2>✏️ Edit Book — {{ book.id }}</h2>
  <form method="POST" action="{{ url_for('edit_book', book_id=book.id) }}">
    <div class="form-group">
      <label>Book Title *</label>
      <input type="text" name="title" value="{{ book.title }}" required>
    </div>
    <div class="form-group">
      <label>Author(s) *</label>
      <input type="text" name="author" value="{{ book.author }}" required>
    </div>
    <div class="form-group">
      <label>Category *</label>
      <select name="category" required>
        {% for cat in categories %}
          <option value="{{ cat }}" {% if cat == book.category %}selected{% endif %}>{{ cat }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Quantity *</label>
      <input type="number" name="quantity" value="{{ book.quantity }}" min="0" required>
    </div>
    <div style="display:flex; gap:12px; margin-top:8px;">
      <button type="submit" class="btn btn-primary" style="flex:1;">💾 Save Changes</button>
      <a href="{{ url_for('view_books') }}" class="btn btn-secondary" style="flex:1; justify-content:center;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
